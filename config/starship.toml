# MBO Server Configs - Starship Prompt
# Requires: Nerd Font installed and enabled in terminal
"$schema" = 'https://starship.rs/config-schema.json'

# Increase timeouts: slow commands (uv python on Windows) and directory scans
# (networked filesystems like lustre on HPC can exceed the 30ms scan default)
command_timeout = 1000
scan_timeout = 1000

# Prompt format
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$line_break\
$character"""

[username]
show_always = true
format = "[$user]($style) in "
style_user = "bold #8839ef"
style_root = "bold red"

[hostname]
ssh_only = true
ssh_symbol = "🌐 "
format = "[$ssh_symbol$hostname]($style) in "
style = "bold green"

[directory]
truncation_length = 8
truncate_to_repo = false
style = "bold cyan"
read_only = " 󰌾"

[git_branch]
symbol = " "
format = "on [$symbol$branch]($style) "
style = "bold yellow"

[git_status]
# Show counts for status
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*"
modified = "!${count}"
staged = "+${count}"
renamed = "»"
deleted = "✘"
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"

[python]
symbol = " "
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "bold #fab387"
# Only detect in venv folders (faster)
detect_extensions = []
detect_files = []
detect_folders = [".venv", "venv"]

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# OS icon (Windows)
[os]
disabled = false
style = "bold white"

[os.symbols]
Windows = "󰍲 "
