# MBO Server Configs - Starship Prompt
# Requires: Nerd Font installed and enabled in terminal
"$schema" = 'https://starship.rs/config-schema.json'

# Increase timeout for slow commands (uv python can be slow on Windows)
command_timeout = 1000

# Prompt format
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$character"""

[username]
show_always = true
format = "[$user]($style) in "
style_user = "bold yellow"
style_root = "bold red"

[hostname]
ssh_only = true
format = "[$hostname]($style) "
style = "bold blue"

[directory]
truncation_length = 8
truncate_to_repo = false
style = "bold blue"
read_only = " 󰌾"

[git_branch]
symbol = " "
format = "on [$symbol$branch]($style) "
style = "bold purple"

[git_status]
# Show counts for status
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*"
modified = "!${count}"
staged = "+${count}"
renamed = "»"
deleted = "✘"
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"

[python]
symbol = " "
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "yellow"
# Only detect in venv folders (faster)
detect_extensions = []
detect_files = []
detect_folders = [".venv", "venv"]

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# OS icon (Windows)
[os]
disabled = false
style = "bold white"

[os.symbols]
Windows = "󰍲 "
